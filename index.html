<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>흥진파트너스 Ultimate ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; }
        .num-font { font-feature-settings: "tnum"; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 공문서 (디딤이앤에프 HWP/PDF 완벽 반영 A4 폼) */
        .a4-paper {
            width: 100%; max-width: 794px; /* A4 웹 표준 폭 */
            background: white; margin: 0 auto; 
            padding: 60px 50px; color: black;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            /* 세로 길이는 내용물에 따라 자연스럽게 늘어남 (min-height만 유지) */
            min-height: 1123px; 
            display: flex; flex-direction: column;
        }
        .doc-header-line { border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 30px; }
        .doc-info-table th { width: 80px; text-align: left; font-weight: 800; padding: 4px 0; font-size: 16px; vertical-align: top; }
        .doc-info-table td { padding: 4px 0; font-size: 16px; font-weight: 500; vertical-align: top; }
        
        /* 공문서 하단 메타데이터 표 */
        .doc-footer-table { width: 100%; border-top: 2px solid black; border-bottom: 1px solid black; margin-top: 50px; font-size: 13px; border-collapse: collapse; }
        .doc-footer-table th { text-align: left; padding: 8px 4px; font-weight: bold; width: 60px; color: #333; }
        .doc-footer-table td { padding: 8px 4px; color: #555; }
        .doc-footer-table tr { border-bottom: 1px solid #e5e7eb; }
        .doc-footer-table tr:last-child { border-bottom: none; }
    </style>
</head>
<body class="text-slate-800 flex h-screen overflow-hidden">

    <aside class="hidden md:flex flex-col w-64 bg-[#0f172a] text-slate-300 p-5 z-20">
        <div class="mb-8 px-2 cursor-pointer mt-2" onclick="changeTab('dashboard')">
            <h1 class="text-2xl font-black tracking-tight text-white whitespace-nowrap">HEUNGJIN</h1>
            <p class="text-[10px] font-bold text-blue-400 mt-1 uppercase tracking-widest">Supreme ERP</p>
        </div>
        <nav class="flex-1 space-y-1">
            <button onclick="changeTab('dashboard')" class="tab-btn w-full flex items-center space-x-3 px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white" id="pc-dashboard"><i data-lucide="layout-dashboard" class="w-4 h-4"></i><span class="font-medium text-sm">대시보드</span></button>
            <button onclick="changeTab('approval')" class="tab-btn w-full flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white bg-blue-600/20" id="pc-approval"><i data-lucide="file-check-2" class="w-4 h-4"></i><span class="font-medium text-sm">전자결재 및 공문</span></button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden bg-slate-50 relative">
        <header class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center shadow-sm">
            <h2 class="text-sm font-bold text-slate-700">유한책임회사 흥진파트너스</h2>
            <div class="flex items-center space-x-4"><button class="w-8 h-8 bg-blue-600 text-white rounded-full font-bold text-xs shadow-md">JW</button></div>
        </header>

        <div id="content" class="flex-1 overflow-y-auto p-4 md:p-8 pb-32">
            <section id="tab-approval" class="content-section max-w-7xl mx-auto space-y-6">
                <div class="flex flex-col md:flex-row justify-between md:items-end gap-4">
                    <h3 class="text-2xl font-black text-slate-800">전자결재 및 공문함</h3>
                    <div class="flex space-x-2">
                        <div class="relative w-48 md:w-64">
                            <input type="text" id="doc-search" onkeyup="renderDocs()" placeholder="문서 제목/번호 검색" class="w-full text-sm p-2.5 pl-8 border border-slate-300 rounded-lg outline-none focus:border-blue-500">
                            <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute left-2.5 top-3"></i>
                        </div>
                        <button onclick="openModal('online-modal')" class="bg-blue-600 text-white px-4 py-2.5 rounded-lg text-sm font-bold shadow-md hover:bg-blue-700 flex items-center"><i data-lucide="pen-tool" class="w-4 h-4 mr-2"></i>기안 작성</button>
                    </div>
                </div>
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-slate-50 text-slate-500 font-bold border-b border-slate-200">
                            <tr><th class="p-4 w-24 text-center">상태</th><th class="p-4 w-28">기안일자</th><th class="p-4 w-28">승인일자</th><th class="p-4 w-40">문서번호</th><th class="p-4">제목</th></tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100" id="approval-list"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <div id="doc-viewer-modal" class="modal-bg fixed inset-0 bg-slate-900/60 hidden items-start justify-center p-4 z-[200] overflow-y-auto" onclick="if(event.target === this) closeModal('doc-viewer-modal')">
        <div class="relative w-full max-w-[794px] my-4 shadow-2xl">
            <div class="bg-slate-800 rounded-t-xl p-3 flex justify-between items-center text-white sticky top-0 z-10">
                <span class="font-bold text-sm" id="v-modal-header-title">공문 뷰어</span>
                <div class="space-x-2">
                    <button id="btn-approve" onclick="approveDoc()" class="hidden bg-blue-500 px-4 py-1.5 rounded text-sm font-bold">결재 승인</button>
                    <button onclick="closeModal('doc-viewer-modal')" class="bg-slate-600 px-4 py-1.5 rounded text-sm font-bold hover:bg-slate-500">닫기</button>
                </div>
            </div>

            <div class="a4-paper relative rounded-b-xl" id="official-doc-area">
                <h1 class="text-[34px] font-black text-center tracking-[0.5em] mb-2 mt-4 text-black">흥진파트너스</h1>
                <div class="text-center font-bold text-slate-600 tracking-widest mb-6 text-sm">지속 가능한 미래 창조</div>
                
                <table class="doc-info-table w-full mb-8">
                    <tr id="v-target-row"><th>수 신</th><td><input type="text" id="v-target" class="w-full bg-transparent outline-none text-black" value="주식회사 디딤이앤에프"></td></tr>
                    <tr id="v-via-row"><th>(경 유)</th><td><input type="text" id="v-via" class="w-full bg-transparent outline-none text-black" value="주식회사 디딤이앤에프 대표이사"></td></tr>
                    <tr><th>제 목</th><td class="font-bold"><input type="text" id="v-title" class="w-full bg-transparent outline-none text-[16px] text-black" readonly></td></tr>
                </table>

                <div id="v-content" class="w-full outline-none bg-transparent whitespace-pre-wrap leading-loose text-[16px] font-medium text-black min-h-[300px]" contenteditable="false"></div>

                <div class="mt-16 text-right pr-4 relative">
                    <div class="mb-2 text-lg font-bold text-slate-700">매니저 정석현</div>
                    <div class="text-2xl font-black text-black">대표이사 김진홍</div>
                    <div id="v-seal" class="hidden absolute right-[-20px] top-[-10px] w-[80px] h-[80px] border-[4px] border-red-600 text-red-600 rounded-full flex justify-center items-center font-black text-[18px] rotate-[-10deg] opacity-90 select-none mix-blend-multiply bg-white/50">직인<br>생략</div>
                </div>

                <table class="doc-footer-table mt-auto">
                    <tr>
                        <th>협조자</th><td class="w-[30%]"></td>
                        <th>시행</th><td id="v-doc-meta-date" class="font-bold">흥진파트너스- (결재대기)</td>
                    </tr>
                    <tr>
                        <th>접수</th><td></td>
                        <th>기안</th><td id="v-doc-draft-date"></td>
                    </tr>
                    <tr>
                        <th>우편번호</th><td colspan="3">06574 서울시 서초구 방배로 268, 204호</td>
                    </tr>
                    <tr>
                        <th>전화</th><td>010-3928-6944</td>
                        <th>전송</th><td>0504-046-2946</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>

    <div id="online-modal" class="modal-bg fixed inset-0 bg-slate-900/60 hidden items-center justify-center p-4 z-[200]" onclick="if(event.target === this) closeModal('online-modal')">
        <div class="bg-white rounded-xl w-full max-w-lg p-6 shadow-2xl">
            <h4 class="text-xl font-bold mb-4">새 기안 작성</h4>
            <select id="on-type" onchange="toggleExternalFields()" class="w-full bg-slate-50 p-3 rounded border border-slate-300 mb-3 font-bold">
                <option value="내부결재용">내부결재용</option>
                <option value="외부공문용" selected>외부공문용 (디딤이앤에프 양식)</option>
            </select>
            
            <div id="external-fields" class="space-y-3 mb-3">
                <input type="text" id="on-target" placeholder="수신 (예: 주식회사 디딤이앤에프)" class="w-full bg-slate-50 p-3 rounded border border-slate-300">
                <input type="text" id="on-via" placeholder="(경유) (예: 대표이사)" class="w-full bg-slate-50 p-3 rounded border border-slate-300">
            </div>

            <input type="text" id="on-title" placeholder="문서 제목" class="w-full bg-slate-50 p-3 rounded border border-slate-300 mb-3 font-bold">
            <textarea id="on-content" rows="6" placeholder="내용을 입력하세요..." class="w-full bg-slate-50 p-3 rounded border border-slate-300 resize-none mb-4 text-sm leading-relaxed"></textarea>
            <div class="flex space-x-2"><button onclick="closeModal('online-modal')" class="flex-1 py-3 bg-slate-100 font-bold rounded">취소</button><button onclick="submitOnlineDoc()" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded">상신</button></div>
        </div>
    </div>

    <script>
        // Data (HWP 기준)
        let docs = [
            { id: 1, docNo: '흥진파트너스-461240703001', type: '외부공문용', target: '주식회사 디딤이앤에프', via: '주식회사 디딤이앤에프 대표이사', title: '제9회차 전환사채 조기상환청구 행사 관련 통지 안내', draftDate: '2024-07-01', approveDate: '2024-07-03', status: '결재완료', content: '1. 귀사의 무궁한 발전을 기원합니다.\n\n2. 당사는 귀사가 발행한 제9회차 전환사채를 보유하고 있으며, 2024년 2월 14일 권면금액 5억 원에 대한 조기상환청구를 행사하였습니다. 그러나 2024년 7월 3일 현재까지 이에 대한 상환이 전혀 이루어지지 않고 있는 사실이 있습니다.\n\n3. 이에 당사는 귀사에게 2024년 7월 5일까지 최소 3억 원 상당의 상환을 이행하고, 향후 잔액에 대한 상환 계획을 제안해 줄 것을 요청드립니다. 만약 기한 내에 이행되지 않을 경우, 당사는 법원에 즉시 파산신청을 청구할 것임을 귀사에게 통지하는 바입니다. 끝.' },
            { id: 2, docNo: '임시-002', type: '외부공문용', target: 'OO회계법인 대표이사', via: '세무대리인', title: '2025년도 재무제표 감사 요청', draftDate: '2026-04-09', approveDate: '-', status: '결재대기', content: '1. 당사의 2025 회계연도 재무제표에 대한 정기 감사를 요청합니다.' }
        ];

        let currentDocId = null;

        function renderDocs() {
            const query = document.getElementById('doc-search').value.toLowerCase();
            const filtered = docs.filter(d => d.title.toLowerCase().includes(query) || d.docNo.toLowerCase().includes(query));
            
            document.getElementById('approval-list').innerHTML = filtered.map(d => `
                <tr class="hover:bg-slate-50 cursor-pointer" onclick="openDocViewer(${d.id})">
                    <td class="p-4 text-center"><span class="px-2.5 py-1 rounded text-[11px] font-bold ${d.status === '결재완료' ? 'bg-slate-100 text-slate-600' : 'bg-orange-100 text-orange-700'}">${d.status}</span></td>
                    <td class="p-4 text-slate-500 num-font">${d.draftDate}</td>
                    <td class="p-4 text-blue-600 font-medium num-font">${d.approveDate}</td>
                    <td class="p-4 font-medium text-slate-600">${d.docNo}</td>
                    <td class="p-4 font-bold text-slate-800">${d.title}</td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function toggleExternalFields() {
            const type = document.getElementById('on-type').value;
            const extFields = document.getElementById('external-fields');
            if(type === '외부공문용') extFields.classList.remove('hidden');
            else extFields.classList.add('hidden');
        }

        function submitOnlineDoc() {
            const type = document.getElementById('on-type').value;
            const title = document.getElementById('on-title').value;
            const target = document.getElementById('on-target').value;
            const via = document.getElementById('on-via').value;
            const content = document.getElementById('on-content').value;
            if(!title) return;
            
            const today = new Date().toISOString().split('T')[0];
            docs.unshift({ id: Date.now(), docNo: '임시-'+Date.now().toString().slice(-4), type, target, via, title, draftDate: today, approveDate: '-', status: '결재대기', content });
            closeModal('online-modal');
            renderDocs();
        }

        function openDocViewer(id) {
            const doc = docs.find(d => d.id === id);
            currentDocId = id;
            
            // 데이터 매핑
            document.getElementById('v-title').value = doc.title;
            document.getElementById('v-content').innerText = doc.content; // div라서 innerText 사용
            document.getElementById('v-doc-draft-date').innerText = doc.draftDate;

            if(doc.type === '내부결재용') {
                document.getElementById('v-target-row').style.display = 'none';
                document.getElementById('v-via-row').style.display = 'none';
            } else {
                document.getElementById('v-target-row').style.display = 'table-row';
                document.getElementById('v-via-row').style.display = 'table-row';
                document.getElementById('v-target').value = doc.target || '';
                document.getElementById('v-via').value = doc.via || '';
            }

            const isPending = doc.status === '결재대기';
            
            // 편집 모드 제어 (div contenteditable 활용)
            document.getElementById('v-title').readOnly = !isPending;
            document.getElementById('v-target').readOnly = !isPending;
            document.getElementById('v-via').readOnly = !isPending;
            document.getElementById('v-content').contentEditable = isPending ? "true" : "false";
            
            if(isPending) {
                document.getElementById('btn-approve').classList.remove('hidden');
                document.getElementById('v-seal').classList.add('hidden');
                document.getElementById('v-doc-meta-date').innerText = `흥진파트너스- (결재대기)`;
                document.getElementById('v-content').classList.add('bg-blue-50/30', 'border', 'border-blue-200', 'p-2', 'rounded');
            } else {
                document.getElementById('btn-approve').classList.add('hidden');
                document.getElementById('v-seal').classList.remove('hidden'); 
                document.getElementById('v-doc-meta-date').innerHTML = `${doc.docNo} <span class="text-slate-400">(${doc.approveDate.replace(/-/g, '.')})</span>`;
                document.getElementById('v-content').classList.remove('bg-blue-50/30', 'border', 'border-blue-200', 'p-2', 'rounded');
            }
            openModal('doc-viewer-modal');
        }

        function approveDoc() {
            const doc = docs.find(d => d.id === currentDocId);
            doc.title = document.getElementById('v-title').value;
            doc.content = document.getElementById('v-content').innerText;
            if(doc.type === '외부공문용') {
                doc.target = document.getElementById('v-target').value;
                doc.via = document.getElementById('v-via').value;
            }
            doc.status = '결재완료';
            
            const today = new Date().toISOString().split('T')[0];
            doc.approveDate = today;
            doc.docNo = `흥진파트너스-${today.replace(/-/g, '')}001`;
            
            closeModal('doc-viewer-modal');
            renderDocs();
        }

        function changeTab(tab) {
            // 이번 렌더링에선 탭 1개만 사용하므로 기능 생략 (더미)
        }
        function openModal(id) { document.getElementById(id).classList.replace('hidden', 'flex'); }
        function closeModal(id) { document.getElementById(id).classList.replace('flex', 'hidden'); }

        document.addEventListener('DOMContentLoaded', () => { renderDocs(); lucide.createIcons(); });
    </script>
</body>
</html>
